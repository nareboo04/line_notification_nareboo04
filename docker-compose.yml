services:
  api:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 5000
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    env_file: .env
    environment:
      TZ: Asia/Bangkok
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-users_db}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  main:
    build: .
    command: python -m app.main
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Bangkok
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-users_db}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      TZ: Asia/Bangkok
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-users_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -hlocalhost -uroot -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      TZ: Asia/Bangkok
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql
    profiles:
      - dev
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
